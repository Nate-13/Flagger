<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flagger — Follow across pages</title>
    <style>
      :root {
        --hazard: #ffc800;
        --hazard-dark: #e6b400;
        --black: #0a0a0a;
        --cream: #fffdf5;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 22px;
        background: var(--cream);
        color: var(--black);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }
      h1 {
        font-size: 16px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin: 0 0 10px;
      }
      p {
        margin: 0 0 12px;
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }
      button {
        flex: 1;
        padding: 10px 14px;
        border-radius: 5px;
        border: 2px solid var(--black);
        cursor: pointer;
        font-weight: 800;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-family: inherit;
      }
      .allow {
        background: var(--hazard);
        box-shadow: 3px 3px 0 var(--black);
      }
      .allow:hover {
        background: var(--hazard-dark);
      }
      .cancel {
        background: #fff;
      }
      .cancel:hover {
        background: #f2f2f2;
      }
      .note {
        font-size: 12px;
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <h1>Follow across pages</h1>
    <p>
      Let Flagger stay open as you move between pages, so your session keeps
      going without re-opening it each time.
    </p>
    <p class="note">
      This needs permission to run on the sites you visit. Chrome will ask you
      to confirm. Closing Flagger (✕ or Copy &amp; Exit) stops it.
    </p>
    <div class="row">
      <button class="cancel" id="cancel">Not now</button>
      <button class="allow" id="allow">Allow</button>
    </div>
    <script src="enable-follow.js"></script>
  </body>
</html>
